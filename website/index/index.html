<!DOCTYPE html>
<html lang="zh-CN">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>首页 - 无人机系统</title>
	<style>
		body {
			margin: 0;
			min-height: 100vh;
			display: grid;
			place-items: center;
			font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
			background: linear-gradient(140deg, #17212f, #184d5b 45%, #1f6f66);
			color: #fff;
		}

		.panel {
			width: min(90vw, 700px);
			border-radius: 14px;
			padding: 30px;
			background: rgba(255, 255, 255, 0.1);
			border: 1px solid rgba(255, 255, 255, 0.25);
			backdrop-filter: blur(8px);
		}

		h1 {
			margin-top: 0;
			margin-bottom: 20px;
		}

		.links {
			display: flex;
			flex-wrap: wrap;
			gap: 12px;
		}

		a {
			color: #fff;
			text-decoration: none;
			padding: 10px 14px;
			border-radius: 8px;
			border: 1px solid rgba(255, 255, 255, 0.5);
			background: rgba(255, 255, 255, 0.1);
		}

		a:hover {
			background: rgba(255, 255, 255, 0.2);
		}
	</style>
</head>
<body>
	<section class="panel">
		<h1>无人机后台管理系统</h1>
		<div class="links">
			<a href="../login/login.html">登录页</a>
			<a href="../task-center/index.html">任务管理页</a>
			<a href="../route-plan/index.html">航线规划页</a>
		</div>
	</section>
</body>
</html>
