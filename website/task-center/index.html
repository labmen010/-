<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>任务管理 - 无人机智能巡检管控系统</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="topbar">
        <div class="brand">无人机智能巡检管控系统</div>
        <nav class="topnav">
            <a href="#">管控中心</a>
            <a class="active" href="index.html">作业中心</a>
            <a href="#">飞控中心</a>
            <a href="#">系统中心</a>
        </nav>
        <div id="userPanel" class="user-panel">管理员：admin</div>
    </header>

    <main class="layout">
        <aside class="sidebar">
            <a class="menu-item active" href="index.html">任务管理</a>
            <a class="menu-item" href="object_detection.html">图像检测</a>
            <a class="menu-item" href="#">任务记录</a>
            <a class="menu-item" href="../route-plan/index.html">航线规划</a>
            <a class="menu-item" href="#">巡检对象管理</a>
            <a class="menu-item" href="#">禁飞区管理</a>
        </aside>

        <section class="content">
            <div class="crumb">作业中心 / 任务管理</div>

            <section class="card filter-card">
                <div class="filter-grid">
                    <label>任务名称
                        <input id="taskName" type="text" placeholder="请输入任务名称">
                    </label>
                    <label>任务类型
                        <select id="taskType">
                            <option value="all">全部</option>
                            <option value="周期性任务">周期性任务</option>
                            <option value="单次性任务">单次性任务</option>
                        </select>
                    </label>
                    <label>执行周期
                        <select id="taskCycle">
                            <option value="all">全部</option>
                            <option value="每天">每天</option>
                            <option value="每3天">每3天</option>
                            <option value="每7天">每7天</option>
                            <option value="每30天">每30天</option>
                            <option value="单次">单次</option>
                        </select>
                    </label>
                    <label>任务状态
                        <select id="taskStatus">
                            <option value="all">全部</option>
                            <option value="执行中">执行中</option>
                            <option value="已完成">已完成</option>
                            <option value="待执行">待执行</option>
                            <option value="已取消">已取消</option>
                        </select>
                    </label>
                </div>
                <div class="filter-actions">
                    <button id="resetBtn" class="btn btn-secondary">重置</button>
                    <button id="searchBtn" class="btn btn-primary">搜索</button>
                </div>
            </section>

            <section class="card table-card">
                <div class="toolbar">
                    <button id="createTaskBtn" class="btn btn-primary">新增任务</button>
                    <button id="downloadBtn" class="btn btn-secondary">批量下载</button>
                </div>

                <div class="table-wrap">
                    <table>
                        <thead>
                            <tr>
                                <th>序号</th>
                                <th>任务名称</th>
                                <th>任务类型</th>
                                <th>执行周期</th>
                                <th>任务状态</th>
                                <th>开始时间</th>
                                <th>结束时间</th>
                                <th>累计执行</th>
                                <th>启用</th>
                                <th>操作</th>
                            </tr>
                        </thead>
                        <tbody id="taskTableBody"></tbody>
                    </table>
                </div>

                <div class="pagination">
                    <span id="summary"></span>
                    <div class="page-actions">
                        <button id="prevPage" class="btn btn-secondary">上一页</button>
                        <span id="pageText"></span>
                        <button id="nextPage" class="btn btn-secondary">下一页</button>
                    </div>
                </div>
            </section>
        </section>
    </main>

    <div id="taskModal" class="task-modal hidden">
        <div class="task-modal-card">
            <div class="task-modal-header">
                <h3 id="taskModalTitle">新增任务</h3>
                <button id="taskModalClose" class="task-modal-close" type="button">×</button>
            </div>

            <div class="task-form-grid">
                <label>任务名称<input id="formName" type="text" placeholder="请输入任务名称"></label>
                <label>任务类型
                    <select id="formType">
                        <option value="周期性任务">周期性任务</option>
                        <option value="单次性任务">单次性任务</option>
                    </select>
                </label>
                <label>执行周期
                    <select id="formCycle">
                        <option value="每天">每天</option>
                        <option value="每3天">每3天</option>
                        <option value="每7天">每7天</option>
                        <option value="每30天">每30天</option>
                        <option value="单次">单次</option>
                    </select>
                </label>
                <label>任务状态
                    <select id="formStatus">
                        <option value="执行中">执行中</option>
                        <option value="已完成">已完成</option>
                        <option value="待执行" selected>待执行</option>
                        <option value="已取消">已取消</option>
                    </select>
                </label>
                <label>开始时间<input id="formStartTime" type="text" placeholder="例如 2026-04-10 09:00"></label>
                <label>结束时间<input id="formEndTime" type="text" placeholder="例如 2026-04-30"></label>
                <label>已执行次数<input id="formExecutedDone" type="number" min="0" value="0"></label>
                <label>总执行次数<input id="formExecutedTotal" type="number" min="1" value="1"></label>
                <label>启用状态
                    <select id="formEnabled">
                        <option value="true" selected>启用</option>
                        <option value="false">禁用</option>
                    </select>
                </label>
            </div>

            <p id="taskFormTip" class="task-form-tip"></p>

            <div class="task-modal-actions">
                <button id="taskModalSubmit" class="btn btn-primary" type="button">保存</button>
                <button id="taskModalCancel" class="btn btn-secondary" type="button">取消</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
