<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>图像检测 - 无人机智能巡检管控系统</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .detect-grid {
            display: grid;
            grid-template-columns: minmax(300px, 380px) 1fr;
            gap: 14px;
        }

        .upload-box {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .hint {
            color: var(--text-sub);
            font-size: 13px;
        }

        .img-stage {
            min-height: 360px;
            border: 1px dashed #c5ccd8;
            border-radius: 8px;
            background: #f8fafc;
            display: grid;
            place-items: center;
            overflow: hidden;
        }

        .img-stage img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .img-empty {
            color: #8a94a6;
            font-size: 14px;
        }

        .result-list {
            margin: 0;
            padding-left: 18px;
            color: #374151;
            font-size: 14px;
        }

        .status {
            min-height: 22px;
            color: #1d4ed8;
            font-size: 14px;
        }

        @media (max-width: 1080px) {
            .detect-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <header class="topbar">
        <div class="brand">无人机智能巡检管控系统</div>
        <nav class="topnav">
            <a href="#">管控中心</a>
            <a class="active" href="index.html">作业中心</a>
            <a href="#">飞控中心</a>
            <a href="#">系统中心</a>
        </nav>
        <div class="user-panel">管理员：admin</div>
    </header>

    <main class="layout">
        <aside class="sidebar">
            <a class="menu-item" href="index.html">任务管理</a>
            <a class="menu-item active" href="object_detection.html">图像检测</a>
            <a class="menu-item" href="#">任务记录</a>
            <a class="menu-item" href="../route-plan/index.html">航线规划</a>
            <a class="menu-item" href="#">巡检对象管理</a>
            <a class="menu-item" href="#">禁飞区管理</a>
        </aside>

        <section class="content">
            <div class="crumb">作业中心 / 图像检测</div>

            <section class="card detect-grid">
                <div class="upload-box">
                    <label>选择检测图片
                        <input id="fileInput" type="file" accept="image/*">
                    </label>
                    <div class="hint">支持 JPG、PNG 等常见格式，点击按钮后将调用后端 YOLOv26 模型。</div>
                    <button id="detectBtn" class="btn btn-primary">上传并检测</button>
                    <div id="statusText" class="status"></div>
                    <div>
                        <strong>检测目标</strong>
                        <ul id="resultList" class="result-list"></ul>
                    </div>
                </div>

                <div>
                    <div class="hint">结果图（含检测框）</div>
                    <div id="resultStage" class="img-stage">
                        <span class="img-empty">检测完成后在此展示结果图</span>
                    </div>
                </div>
            </section>
        </section>
    </main>

    <script>
        const API_BASE = "http://127.0.0.1:8000";
        const refs = {
            fileInput: document.getElementById("fileInput"),
            detectBtn: document.getElementById("detectBtn"),
            statusText: document.getElementById("statusText"),
            resultList: document.getElementById("resultList"),
            resultStage: document.getElementById("resultStage")
        };

        function setStatus(text, isError = false) {
            refs.statusText.textContent = text;
            refs.statusText.style.color = isError ? "#b91c1c" : "#1d4ed8";
        }

        function renderResultImage(url) {
            if (!url) {
                refs.resultStage.innerHTML = '<span class="img-empty">未生成结果图</span>';
                return;
            }

            const img = document.createElement("img");
            img.alt = "检测结果图";
            img.src = `${API_BASE}${url}?t=${Date.now()}`;

            refs.resultStage.innerHTML = "";
            refs.resultStage.appendChild(img);
        }

        function renderObjects(objects) {
            if (!Array.isArray(objects) || objects.length === 0) {
                refs.resultList.innerHTML = "<li>未检测到目标</li>";
                return;
            }

            refs.resultList.innerHTML = objects.map((item) => {
                const conf = (Number(item.confidence) * 100).toFixed(2);
                return `<li>${item.label}（置信度 ${conf}%）</li>`;
            }).join("");
        }

        async function detectImage() {
            const file = refs.fileInput.files[0];
            if (!file) {
                setStatus("请先选择图片文件", true);
                return;
            }

            const formData = new FormData();
            formData.append("file", file);
            refs.detectBtn.disabled = true;
            setStatus("正在上传并检测，请稍候...");
            refs.resultList.innerHTML = "";

            try {
                const response = await fetch(`${API_BASE}/api/detect`, {
                    method: "POST",
                    body: formData
                });

                const data = await response.json();
                if (!response.ok) {
                    throw new Error(data.message || "请求失败");
                }

                if (!data.result || data.result.status !== "success") {
                    throw new Error((data.result && data.result.message) || "检测失败");
                }

                renderObjects(data.result.objects);
                renderResultImage(data.result.result_image_url);
                setStatus(`检测完成，共识别 ${data.result.objects.length} 个目标`);
            } catch (error) {
                setStatus(`检测失败：${error.message}`, true);
                refs.resultList.innerHTML = "<li>请检查后端服务与模型配置</li>";
            } finally {
                refs.detectBtn.disabled = false;
            }
        }

        refs.detectBtn.addEventListener("click", detectImage);
    </script>
</body>
</html>
